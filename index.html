<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABOUT BERRY</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      padding-top: 60px;
      padding-bottom: 60px;

      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.45), transparent 35%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.35), transparent 35%),
        linear-gradient(135deg, #0f172a, #111827, #312e81);

      overflow-y: auto;
    }

    body::before {
      content: "";
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      top: -100px;
      right: -80px;
      filter: blur(2px);
    }

    body::after {
      content: "";
      position: fixed;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      bottom: -70px;
      left: -60px;
    }



    .particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      bottom: -20px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.65);
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.55);
      animation: floatParticle linear infinite;
    }

    .particle:nth-child(1) { left: 8%; animation-duration: 9s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 18%; width: 4px; height: 4px; animation-duration: 12s; animation-delay: 2s; }
    .particle:nth-child(3) { left: 28%; width: 9px; height: 9px; animation-duration: 10s; animation-delay: 4s; }
    .particle:nth-child(4) { left: 42%; width: 5px; height: 5px; animation-duration: 14s; animation-delay: 1s; }
    .particle:nth-child(5) { left: 55%; width: 8px; height: 8px; animation-duration: 11s; animation-delay: 3s; }
    .particle:nth-child(6) { left: 68%; width: 4px; height: 4px; animation-duration: 13s; animation-delay: 5s; }
    .particle:nth-child(7) { left: 78%; width: 10px; height: 10px; animation-duration: 9s; animation-delay: 2.5s; }
    .particle:nth-child(8) { left: 88%; width: 6px; height: 6px; animation-duration: 15s; animation-delay: 1.5s; }
    .particle:nth-child(9) { left: 35%; width: 3px; height: 3px; animation-duration: 16s; animation-delay: 6s; }
    .particle:nth-child(10) { left: 62%; width: 6px; height: 6px; animation-duration: 12s; animation-delay: 7s; }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }

      15% {
        opacity: 0.9;
      }

      50% {
        transform: translateY(-50vh) translateX(24px) scale(1.25);
      }

      100% {
        transform: translateY(-105vh) translateX(-20px) scale(0.7);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 390px;
      padding: 30px 24px;
      margin: auto;
      text-align: center;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
      animation: slideUp 0.8s ease;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .avatar-wrap {
      width: 142px;
      height: 142px;
      margin: 0 auto 18px;
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, #818cf8, #f472b6, #facc15);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.38);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #111827;
      display: block;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .username {
      color: #c7d2fe;
      font-size: 15px;
      margin-bottom: 16px;
    }

    .tag-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tag {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #f8fafc;
    }

    .lang-btn {
      margin-bottom: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #111827;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .lang-btn.active {
      background: white;
      color: #111827;
      border: 1px solid white;
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.28);
    }

    .lang-btn:hover {
      transform: scale(1.04);
      background: white;
    }

    .bio {
      font-size: 15px;
      line-height: 1.7;
      color: #e5e7eb;
      margin-bottom: 26px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: white;
      padding: 15px 18px;
      border-radius: 999px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .link-button:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.24);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);

    }

    .main-link {
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border: none;
    }

    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #cbd5e1;
    }

    @media (max-width: 420px) {
      .card {
        padding: 28px 20px;
        border-radius: 30px;
      }

      h1 {
        font-size: 31px;
      }
    }

    .lang-switch {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .lang-btn {
      padding: 10px 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: white;
      cursor: pointer;
      font-weight: bold;
      border: 1px solid rgba(255, 255, 255, 0.28);
      transition: 0.2s;
    }

    .lang-btn:hover {
      background: white;
      color: #111827;
      transform: translateY(-2px);
    }

    #time {
      color: #e5e7eb;
      font-size: 10px;
      margin-bottom: 14px;
      font-family: 'Press Start 2P', monospace;
      animation: blink 1s infinite;
    }

    .music-toggle {
      position: absolute;
      top: 18px;
      right: 18px;

      padding: 8px 14px;
      border-radius: 999px;

      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);

      cursor: pointer;

      font-size: 13px;
      font-weight: bold;

      transition: 0.2s;
    }

    .music-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .status {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;

      margin-bottom: 18px;

      color: #cbd5e1;
      font-size: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;

      box-shadow: 0 0 10px #22c55e;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
    }

    #loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: 0.6s;
    }

    .card {
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .link-button {
      animation: fadeInButton 0.8s ease;
    }

    @keyframes fadeInButton {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes blink {
        0% {
          opacity: 1;
        }

        50% {
          opacity: 0.6;
        }

        100% {
          opacity: 1;
        }
      }
    }
  </style>
</head>

<body>

  <div class="particles">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>

  <div id="loader">
    <p>Loading...</p>
  </div>

  <main class="card">
    <div class="avatar-wrap">
      <img class="avatar" src="profile.png" alt="Berry photo" />
    </div>

    <h1>Berry</h1>
    <p class="username">@zhongti0126</p>
    <div class="status">
      <span class="dot"></span>
      <span id="statusText">Currently learning frontend</span>
    </div>
    <p id="time"></p>

    <div class="tag-row" id="tags">
      <span class="tag">CS Student</span>
      <span class="tag">Language Learner</span>
      <span class="tag">Creative Beginner</span>
    </div>

    <div class="lang-switch">
      <button onclick="setEnglish()" class="lang-btn active" id="englishBtn">
        English
      </button>

      <button onclick="setChinese()" class="lang-btn" id="chineseBtn">
        中文
      </button>
    </div>


    <audio id="bg-music" autoplay loop>
      <source src="bg.mp3" type="audio/mp3">
    </audio>

    <p class="bio" id="bio">
      Indonesian × Taiwanese<br>
      CS student in Taiwan<br>
      Learning languages, coding, and creating things
    </p>

    <section class="links">
      <a id="instagramBtn" class="link-button main-link" href="https://www.instagram.com/zhongti0126/" target="_blank">
        ✨ Instagram
      </a>

      <a id="githubBtn" class="link-button secondary" href="https://github.com/zhongti0126" target="_blank">
        💻 GitHub
      </a>

      <a id="contactBtn" class="link-button" href="mailto:zhongti.official@gmail.com">
        ✉️ Contact Me
      </a>

      <div class="music-toggle" onclick="toggleMusic()">
        <span id="music-status">🔇</span>
      </div>

    </section>

    <p class="footer" id="footer">Made by Berry</p>
  </main>

  <script>
    document.body.addEventListener("touchstart", () => {
      music.play();
    }, { once: true });

    document.body.addEventListener("click", () => {
      music.play();
    }, { once: true });

    let chinese = false;

    const music = document.getElementById("bg-music");
    let playing = false;

    function updateTime() {

      const now = new Date();

      document.getElementById("time").innerHTML =
        now.toLocaleTimeString();
    }

    setInterval(updateTime, 1000);

    function toggleMusic() {
      const status = document.getElementById("music-status");

      if (!playing) {
        music.play();
        playing = true;
        status.textContent = "🔈";
      } else {
        music.pause();
        playing = false;
        status.textContent = "🔇";
      }
    }

    function setChinese() {

      document.getElementById("chineseBtn").classList.add("active");
      document.getElementById("englishBtn").classList.remove("active");
      document.getElementById("statusText").textContent = "正在學習前端";
      document.getElementById("tags").innerHTML = `
    <span class="tag">資工系</span>
    <span class="tag">語言學習中</span>
    <span class="tag">創作新手</span>
  `;

      document.getElementById("bio").innerHTML = `
    印尼 × 台灣<br>
    在台灣讀資工<br>
    喜歡語言、寫程式與創作
  `;

      document.getElementById("instagramBtn").innerHTML = "✨ Instagram";
      document.getElementById("githubBtn").innerHTML = "💻 GitHub";
      document.getElementById("contactBtn").innerHTML = "✉️ 聯絡我";
      document.getElementById("footer").textContent = "由 Berry 製作";
    }

    function setEnglish() {
      document.getElementById("englishBtn").classList.add("active");
      document.getElementById("chineseBtn").classList.remove("active");
      document.getElementById("statusText").textContent = "Currently learning frontend";
      document.getElementById("tags").innerHTML = `
    <span class="tag">CS Student</span>
    <span class="tag">Language Learner</span>
    <span class="tag">Creative Beginner</span>
  `;

      document.getElementById("bio").innerHTML = `
    Indonesian × Taiwanese<br>
    CS student in Taiwan<br>
    Learning languages, coding, and creating things.
  `;

      document.getElementById("instagramBtn").innerHTML = "✨ Instagram";
      document.getElementById("githubBtn").innerHTML = "💻 GitHub";
      document.getElementById("contactBtn").innerHTML = "✉️ Contact Me";
      document.getElementById("footer").textContent = "Made by Berry";
    }

    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("loader").classList.add("hide");
      }, 900);
    });

  </script>
</body>

</html>
